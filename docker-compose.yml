version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env                  # GROQ_API_KEY loaded from your local .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_URL=http://api:8000   # talks to the api service internally
    depends_on:
      - api
    restart: unless-stopped
