version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install streamlit requests pandas --quiet &&
             streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - FASTAPI_URL=http://api:8000
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api
    restart: unless-stopped
